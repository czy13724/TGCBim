name = "tgcontactbot"
main = "index.js"
compatibility_date = "2024-02-28"

[[d1_databases]]
binding = "DB"
database_name = "TGBOT"
database_id = ""

# ============================================================
# ⚠️  SECRETS — Set in CF Dashboard → Workers → Secrets
#     Or: wrangler secret put <NAME>
# ============================================================
# BOT_TOKEN       your Telegram bot token
# BOT_SECRET      webhook validation secret (any random string)
# EXPORT_SECRET   optional, protects /export endpoint

# ============================================================
# Required
# ============================================================
[vars]
ADMIN_UID = ""    # Bot owner Telegram user ID
# ADMIN_GROUP_ID   = "-100xxxxxxxxxx" # Admin group (for Group Mode)
# ADMINS           = "uid1,uid2"      # Additional admin user IDs (comma-separated)

# ============================================================
# Bot Messages
# ============================================================
WELCOME_MESSAGE      = "Welcome to use LeviFREE bot!"
MAINTENANCE_MESSAGE  = "We are under maintenance. Please try again later."
# START_MSG_URL    = ""               # Remote URL to load start message from

# ============================================================
# Verification
# ============================================================
ENABLE_VERIFICATION      = "true"   # Enable captcha for new users
VERIFICATION_VALID_HOURS = "2"      # How long verification lasts (hours)

# ============================================================
# Notification
# ============================================================
ENABLE_NOTIFICATION  = "false"      # Send UID notification on new user
# NOTIFICATION_URL = ""             # Webhook URL for new user notifications

# ============================================================
# Business Hours
# ============================================================
BUSINESS_HOURS_START = "09:00"
BUSINESS_HOURS_END   = "22:00"
BUSINESS_TIMEZONE    = "Asia/Shanghai"

# ============================================================
# Topic / Group Mode
# ============================================================
AUTO_CLOSE_INACTIVE_HOURS = "72"    # Auto-close idle topics after N hours
DELETE_TOPIC_AS_BAN       = "false" # Delete topic = ban user
GROUP_SPAM_DETECTION      = "true"  # Detect spam in group messages
GROUP_SPAM_ACTION         = "ban"   # block / ban
GROUP_ADMIN_PERMISSIONS   = "true"  # Respect group admin permissions

# ============================================================
# Spam Filter
# ============================================================
ENABLE_SPAM_FILTER   = "true"
SPAM_ACTION          = "block"   # block / delete
DELETE_SPAM_MESSAGE  = "true"
SPAM_KEYWORDS        = "操逼赚钱,挖掘花,招聘花,提供设备,代理花,兼职,招探花"
SPAM_BLOCKLIST_URL   = "https://raw.githubusercontent.com/czy13724/czy13724/levi/blocklist.txt"

# ============================================================
# Anti-Flood
# ============================================================
ANTI_FLOOD_MESSAGES  = "5"  # Max messages per window
ANTI_FLOOD_SECONDS   = "5"  # Window size in seconds

# ============================================================
# Broadcast
# ============================================================
MAX_BROADCAST_BATCH  = "50"

# ============================================================
# Log Retention
# ============================================================
ENV_LOG_RETENTION_DAYS = "7"  # Keep message_logs for N days (0 = disabled)

# ============================================================
# Advanced / Optional
# ============================================================
# WHITELIST_URL        = ""   # Remote URL for whitelisted user IDs
# SECURITY_DB_URL      = ""   # External security blocklist URL
# PUBLIC_BASE_URL      = ""   # Public base URL of this worker
# ENABLE_AUTO_TRANSLATE = "false"
# TRANSLATE_TARGET_LANG = "en"
